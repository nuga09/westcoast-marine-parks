      <stop offset="0" stop-color="#E7F3FF"/>
      <stop offset="0.65" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
