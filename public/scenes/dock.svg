<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dock and boats on calm water">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E7F3FF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#0B1220" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B45309" stop-opacity="0.90"/>
      <stop offset="1" stop-color="#92400E" stop-opacity="0.90"/>
    </linearGradient>
    <linearGradient id="hull" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0B1220" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#111827" stop-opacity="0.92"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>

  <!-- water -->
  <path d="M0 190c150 58 320 18 460 4 170-18 300-12 420 42 120 54 220 60 320 34V360H0V190Z" fill="url(#water)"/>

  <!-- waves -->
  <g opacity="0.55" stroke="#0B1220" stroke-opacity="0.18" stroke-width="6" stroke-linecap="round">
    <path d="M80 252c50 18 100 18 150 0 50-18 100-18 150 0 50 18 100 18 150 0"/>
    <path d="M520 286c52 18 104 18 156 0 52-18 104-18 156 0 52 18 104 18 156 0"/>
  </g>

  <!-- dock -->
  <g opacity="0.95">
    <path d="M190 120h410v34H190v-34Z" fill="url(#wood)"/>
    <path d="M190 154h410v14H190v-14Z" fill="#7C2D12" fill-opacity="0.35"/>
    <rect x="232" y="168" width="18" height="120" rx="6" fill="#78350F" fill-opacity="0.85"/>
    <rect x="314" y="168" width="18" height="120" rx="6" fill="#78350F" fill-opacity="0.85"/>
    <rect x="396" y="168" width="18" height="120" rx="6" fill="#78350F" fill-opacity="0.85"/>
    <rect x="478" y="168" width="18" height="120" rx="6" fill="#78350F" fill-opacity="0.85"/>
  </g>

  <!-- boat A -->
  <g opacity="0.9">
    <path d="M720 218h208c0 0-20 46-64 58-50 14-96 14-140 0-46-14-4-58-4-58Z" fill="url(#hull)"/>
    <path d="M758 214c0-18 14-32 32-32h62c16 0 28 12 28 28v4H758Z" fill="#FFFFFF"/>
    <path d="M742 218h228" stroke="#38BDF8" stroke-opacity="0.45" stroke-width="8" stroke-linecap="round"/>
    <path d="M830 158h10v56h-10v-56Z" fill="#0B1220" fill-opacity="0.85"/>
    <path d="M842 166c40 10 70 34 78 60h-78v-60Z" fill="#FFFFFF"/>
  </g>

  <!-- boat B (smaller, far) -->
  <g opacity="0.5">
    <path d="M1020 178h120c0 0-12 28-38 36-30 8-56 8-82 0-26-8 0-36 0-36Z" fill="#0B1220"/>
    <path d="M1050 176c0-10 8-18 18-18h36c10 0 18 8 18 18v2h-72v-2Z" fill="#FFFFFF"/>
  </g>
</svg>

